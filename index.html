<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratw — Hero Section</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .stagger-item {
    opacity: 0;
    animation: fadeInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .delay-bg  { animation-delay: 0.2s; }
  .delay-nav { animation-delay: 1.0s; }
  .delay-h1  { animation-delay: 1.8s; }
  .delay-p   { animation-delay: 2.6s; }
  .delay-btn { animation-delay: 3.4s; }

  .nav-link {
    position: relative;
    color: rgba(255,255,255,0.85);
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-link::after {
    content: '';
    position: absolute;
    left: 0; bottom: -2px;
    width: 0; height: 1px;
    background: white;
    transition: width 0.25s ease;
  }
  .nav-link:hover { color: white; }
  .nav-link:hover::after { width: 100%; }

  .mobile-menu {
    transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
  }

  .serif-italic {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
  }

  .cta-btn {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .cta-btn:hover {
    transform: scale(1.04);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .cta-btn:active { transform: scale(0.98); }

  .get-template-btn {
    transition: background 0.2s, color 0.2s;
  }
  .get-template-btn:hover {
    background: white;
    color: #111;
  }
</style>
</head>
<body class="bg-[#e5e7eb] min-h-screen flex items-center justify-center p-4">

  <!-- Main container -->
  <div class="stagger-item delay-bg relative w-full max-w-[1400px] aspect-[4/3] md:aspect-[16/9] min-h-[600px] md:min-h-[800px] rounded-[2rem] overflow-hidden shadow-2xl bg-black">

    <!-- Background video -->
    <div class="absolute inset-0 w-full h-full">
      <video
        autoplay loop muted playsinline
        class="w-full h-full object-cover opacity-90"
        src="https://cdn.sceneai.art/Hero%20Section%20Video/e988037c-bf57-4b3b-8ba9-b69167028de8.mp4"
      ></video>
    </div>

    <!-- Dark overlay -->
    <div class="absolute inset-0 bg-black/20"></div>

    <!-- Navigation -->
    <nav class="stagger-item delay-nav absolute top-0 left-0 w-full p-6 md:p-10 flex justify-between items-start md:items-center z-30">

      <!-- Logo -->
      <span class="text-white text-2xl font-bold tracking-[0.2em] uppercase select-none">Ratw</span>

      <!-- Desktop nav -->
      <div class="hidden md:flex items-center space-x-8">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">Pricing</a>
        <a href="#" class="nav-link">About</a>
        <a href="#" class="nav-link">Insights</a>
        <a href="#" class="nav-link">Contact</a>
        <a href="#" class="get-template-btn ml-2 px-5 py-2 border border-white/70 text-white text-sm font-semibold rounded-full" style="letter-spacing:0.02em;">
          Get template
        </a>
      </div>

      <!-- Mobile nav toggle -->
      <div class="relative md:hidden">
        <button
          id="menu-toggle"
          aria-label="Toggle navigation"
          class="w-12 h-12 flex items-center justify-center bg-white/10 hover:bg-white/20 backdrop-blur-sm border border-white/20 rounded-xl transition-colors"
        >
          <!-- Hamburger icon -->
          <svg id="icon-hamburger" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <!-- Close icon -->
          <svg id="icon-close" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>

        <!-- Mobile dropdown -->
        <div
          id="mobile-menu"
          class="mobile-menu absolute top-16 right-0 w-64 bg-white rounded-2xl shadow-2xl py-2 opacity-0 invisible scale-95 translate-y-[-10px]"
        >
          <a href="#" class="block px-5 py-3 text-sm font-medium text-gray-800 hover:bg-gray-50 transition-colors">Home</a>
          <a href="#" class="block px-5 py-3 text-sm font-medium text-gray-800 hover:bg-gray-50 transition-colors">Pricing</a>
          <a href="#" class="block px-5 py-3 text-sm font-medium text-gray-800 hover:bg-gray-50 transition-colors">About</a>
          <a href="#" class="block px-5 py-3 text-sm font-medium text-gray-800 hover:bg-gray-50 transition-colors">Insights</a>
          <a href="#" class="block px-5 py-3 text-sm font-medium text-gray-800 hover:bg-gray-50 transition-colors">Contact</a>
          <div class="mx-4 my-2 pt-2 border-t border-gray-100">
            <a href="#" class="block w-full text-center px-5 py-2.5 bg-gray-900 text-white text-sm font-semibold rounded-full hover:bg-gray-700 transition-colors">
              Get template
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Hero content -->
    <div class="absolute inset-0 flex flex-col items-center justify-end pb-12 md:pb-24 text-center px-4 z-20">

      <!-- Headline -->
      <h1 class="stagger-item delay-h1 text-[58px] leading-[1.08] font-semibold text-white mb-5 tracking-[-0.02em]">
        Plan better,
        <br class="hidden md:block">
        start your day <span class="serif-italic">right</span>
      </h1>

      <!-- Subheadline -->
      <p class="stagger-item delay-p text-white/90 text-[18px] md:text-[20px] font-normal leading-relaxed mb-10">
        A smarter planner for tasks<br>
        priorities and daily structure
      </p>

      <!-- CTA button -->
      <a
        href="#"
        class="stagger-item delay-btn cta-btn inline-flex items-center gap-2 bg-white text-gray-900 font-semibold text-[15px] px-8 py-4 rounded-full"
      >
        Create your plan
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
      </a>
    </div>

  </div>

  <script>
    const toggle = document.getElementById('menu-toggle');
    const menu   = document.getElementById('mobile-menu');
    const ham    = document.getElementById('icon-hamburger');
    const close  = document.getElementById('icon-close');
    let open = false;

    toggle.addEventListener('click', () => {
      open = !open;
      ham.classList.toggle('hidden', open);
      close.classList.toggle('hidden', !open);

      if (open) {
        menu.classList.remove('opacity-0', 'invisible', 'scale-95', 'translate-y-[-10px]');
        menu.classList.add('opacity-100', 'visible', 'scale-100', 'translate-y-0');
      } else {
        menu.classList.add('opacity-0', 'invisible', 'scale-95', 'translate-y-[-10px]');
        menu.classList.remove('opacity-100', 'visible', 'scale-100', 'translate-y-0');
      }
    });

    document.addEventListener('click', (e) => {
      if (open && !toggle.contains(e.target) && !menu.contains(e.target)) {
        open = false;
        ham.classList.remove('hidden');
        close.classList.add('hidden');
        menu.classList.add('opacity-0', 'invisible', 'scale-95', 'translate-y-[-10px]');
        menu.classList.remove('opacity-100', 'visible', 'scale-100', 'translate-y-0');
      }
    });
  </script>
</body>
</html>
